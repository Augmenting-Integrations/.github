name: AI Implementation Runner

on:
  issue_comment:
    types: [created]

jobs:
  gate-and-run:
    if: contains(github.event.comment.body, '/implement')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Validate approved proposal, then trigger AI coding session"
      - run: echo "Open PR to dev branch if present, otherwise main"
