name: AI Bug Report
about: Minimal-input bug report for AI triage and implementation
labels: ["ai-intake", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Mention `@copilot` or `@codex` in your first comment.

        AI must ask grouped clarification questions if the bug report is ambiguous.
  - type: input
    id: expected
    attributes:
      label: What should happen?
      placeholder: "Expected behavior"
    validations:
      required: true
  - type: input
    id: actual
    attributes:
      label: What actually happened?
      placeholder: "Observed behavior"
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where did you see this?
      placeholder: "URL, screen, API route, job name, etc."
    validations:
      required: true
