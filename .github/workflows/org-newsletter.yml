name: Org Team Newsletter

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Collect changes since this date (YYYY-MM-DD)"
        required: false
      until:
        description: "Collect changes until this date (YYYY-MM-DD)"
        required: false
  push:
    branches:
      - main
  schedule:
    - cron: "17 14 * * 1"

permissions:
  contents: read
  discussions: write

jobs:
  summarize-and-publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      FALLBACK_GITHUB_TOKEN: ${{ github.token }}
      REPORTING_OWNER: ${{ vars.REPORTING_OWNER }}
      REPORTING_DISCUSSION_SOURCE_REPOSITORY: ${{ vars.REPORTING_DISCUSSION_SOURCE_REPOSITORY }}
      REPORTING_REPOSITORY: ${{ vars.REPORTING_REPOSITORY }}
      REPORTING_TEAM_MAP_PATH: ${{ vars.REPORTING_TEAM_MAP_PATH }}
      NEWSLETTER_DISCUSSION_CATEGORY: ${{ vars.NEWSLETTER_DISCUSSION_CATEGORY }}
      REPORT_ARTIFACT_RETENTION_DAYS: ${{ vars.REPORT_ARTIFACT_RETENTION_DAYS }}
      ALERTING_STUB_ENABLED: ${{ vars.ALERTING_STUB_ENABLED }}
      ALERTING_STUB_NOTE: ${{ vars.ALERTING_STUB_NOTE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve runtime configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          since_input="${{ github.event.inputs.since }}"
          until_input="${{ github.event.inputs.until }}"

          if [[ -z "$since_input" ]]; then
            since_input="$(date -u -d '7 days ago' +%F)"
          fi

          if [[ -z "$until_input" ]]; then
            until_input="$(date -u +%F)"
          fi

          echo "since=$since_input" >>"$GITHUB_OUTPUT"
          echo "until=$until_input" >>"$GITHUB_OUTPUT"
          echo "owner=${REPORTING_OWNER:-$GITHUB_REPOSITORY_OWNER}" >>"$GITHUB_OUTPUT"
          echo "discussion_source_repo=${REPORTING_DISCUSSION_SOURCE_REPOSITORY:-${REPORTING_REPOSITORY:-${GITHUB_REPOSITORY#*/}}}" >>"$GITHUB_OUTPUT"
          echo "team_map=${REPORTING_TEAM_MAP_PATH:-.github/reporting/teams.json}" >>"$GITHUB_OUTPUT"
          echo "category=${NEWSLETTER_DISCUSSION_CATEGORY:-Announcements}" >>"$GITHUB_OUTPUT"
          echo "artifact_retention=${REPORT_ARTIFACT_RETENTION_DAYS:-30}" >>"$GITHUB_OUTPUT"

      - name: Generate newsletter report
        shell: bash
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
          bash scripts/generate_newsletter_report.sh \
            --since "${{ steps.config.outputs.since }}" \
            --until "${{ steps.config.outputs.until }}" \
            --team-map "${{ steps.config.outputs.team_map }}" \
            --owner "${{ steps.config.outputs.owner }}" \
            --out-dir out

      - name: Publish discussion
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
          title="Team Newsletter: ${{ steps.config.outputs.since }} to ${{ steps.config.outputs.until }}"
          url="$(bash scripts/publish_discussion_report.sh \
            --title "$title" \
            --category "${{ steps.config.outputs.category }}" \
            --body-file out/newsletter.md \
            --repo "${{ steps.config.outputs.owner }}/${{ steps.config.outputs.discussion_source_repo }}" \
            --url-output out/newsletter-discussion-url.txt \
            --number-output out/newsletter-discussion-number.txt)"
          echo "title=$title" >>"$GITHUB_OUTPUT"
          echo "discussion_url=$url" >>"$GITHUB_OUTPUT"

      - name: Write alerting stub
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/report_alert_stub.sh \
            --kind newsletter \
            --title "${{ steps.publish.outputs.title }}" \
            --discussion-url "${{ steps.publish.outputs.discussion_url }}" \
            --output-file out/newsletter-alerting-stub.md

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: team-newsletter
          retention-days: ${{ steps.config.outputs.artifact_retention }}
          path: out/

      - name: Write job summary
        shell: bash
        run: |
          discovery_mode="$(jq -r '.discovery_mode // "unknown"' out/newsletter.json)"
          team_count="$(jq -r '.summary.team_count // 0' out/newsletter.json)"
          repo_count="$(jq -r '.summary.repo_count // 0' out/newsletter.json)"
          {
            echo "## Newsletter Published"
            echo
            echo "- Discussion: ${{ steps.publish.outputs.discussion_url }}"
            echo "- Window: ${{ steps.config.outputs.since }} to ${{ steps.config.outputs.until }}"
            echo "- Discussion source repository: \`${{ steps.config.outputs.owner }}/${{ steps.config.outputs.discussion_source_repo }}\`"
            echo "- Category: \`${{ steps.config.outputs.category }}\`"
            echo "- Team discovery mode: \`${discovery_mode}\`"
            echo "- Teams covered: ${team_count}"
            echo "- Team/repo rows covered: ${repo_count}"
            echo
            echo "Alerting is intentionally stubbed. See \`out/newsletter-alerting-stub.md\` in the workflow artifact."
          } >>"$GITHUB_STEP_SUMMARY"
