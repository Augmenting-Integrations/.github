name: Update org branch health

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes, offset by 3 minutes to reduce top-of-hour API congestion.
    # The change-detection fingerprint in the script ensures a commit is only
    # created when the underlying health data actually changes, so high-frequency
    # polling does not produce spurious commit noise.
    - cron: "3/5 * * * *"

# Only allow one run at a time; cancel the previous run if a new one starts.
concurrency:
  group: org-branch-health
  cancel-in-progress: true

# Minimum permissions: only write access to this repo's contents is needed.
# Cross-repo reads use a separate token (GitHub App or PAT) via env vars below.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the subsequent git push is authenticated.
          token: ${{ secrets.GITHUB_TOKEN }}

      # Preferred: generate a short-lived installation token from a GitHub App.
      # The App must be installed on the org with read access to:
      #   - repository metadata, actions, pull requests, contents
      # Configure vars.ORG_BRANCH_HEALTH_APP_ID and
      # secrets.ORG_BRANCH_HEALTH_APP_PRIVATE_KEY in this repo's settings.
      - name: Generate cross-repo token via GitHub App
        id: app-token
        if: ${{ vars.ORG_BRANCH_HEALTH_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORG_BRANCH_HEALTH_APP_ID }}
          private-key: ${{ secrets.ORG_BRANCH_HEALTH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate branch health dashboard
        env:
          # Cross-repo read token: prefer the GitHub App installation token,
          # fall back to a PAT stored in secrets.ORG_BRANCH_HEALTH_TOKEN.
          # The repo's own GITHUB_TOKEN is intentionally NOT used here so
          # cross-repo reads never require this workflow's write-scoped token.
          ORG_BRANCH_HEALTH_TOKEN: ${{ steps.app-token.outputs.token || secrets.ORG_BRANCH_HEALTH_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/update_org_branch_health.py

      - name: Commit generated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/generated/ profile/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(profile): update org branch health badges"
            git push
          fi
