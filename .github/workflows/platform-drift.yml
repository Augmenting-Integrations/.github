name: Platform Drift Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "11 6 * * 2"

permissions:
  contents: read
  discussions: write

jobs:
  audit-and-publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      FALLBACK_GITHUB_TOKEN: ${{ github.token }}
      REPORTING_OWNER: ${{ vars.REPORTING_OWNER }}
      REPORTING_REPOSITORY: ${{ vars.REPORTING_REPOSITORY }}
      REPORTING_TEAM_MAP_PATH: ${{ vars.REPORTING_TEAM_MAP_PATH }}
      PLATFORM_DRIFT_DISCUSSION_CATEGORY: ${{ vars.PLATFORM_DRIFT_DISCUSSION_CATEGORY }}
      REPORT_ARTIFACT_RETENTION_DAYS: ${{ vars.REPORT_ARTIFACT_RETENTION_DAYS }}
      ALERTING_STUB_ENABLED: ${{ vars.ALERTING_STUB_ENABLED }}
      ALERTING_STUB_NOTE: ${{ vars.ALERTING_STUB_NOTE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve runtime configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          echo "owner=${REPORTING_OWNER:-$GITHUB_REPOSITORY_OWNER}" >>"$GITHUB_OUTPUT"
          echo "reporting_repo=${REPORTING_REPOSITORY:-${GITHUB_REPOSITORY#*/}}" >>"$GITHUB_OUTPUT"
          echo "team_map=${REPORTING_TEAM_MAP_PATH:-.github/reporting/teams.json}" >>"$GITHUB_OUTPUT"
          echo "category=${PLATFORM_DRIFT_DISCUSSION_CATEGORY:-Platform Reports}" >>"$GITHUB_OUTPUT"
          echo "artifact_retention=${REPORT_ARTIFACT_RETENTION_DAYS:-30}" >>"$GITHUB_OUTPUT"

      - name: Generate platform drift report
        shell: bash
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
          scripts/generate_platform_drift_report.sh \
            --team-map "${{ steps.config.outputs.team_map }}" \
            --owner "${{ steps.config.outputs.owner }}" \
            --current-repo "${GITHUB_REPOSITORY}" \
            --out-dir out

      - name: Publish discussion
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_TOKEN:-$FALLBACK_GITHUB_TOKEN}"
          title="Platform Drift Report: $(date -u +%F)"
          url="$(scripts/publish_discussion_report.sh \
            --title "$title" \
            --category "${{ steps.config.outputs.category }}" \
            --body-file out/platform-drift.md \
            --repo "${{ steps.config.outputs.owner }}/${{ steps.config.outputs.reporting_repo }}" \
            --url-output out/platform-drift-discussion-url.txt \
            --number-output out/platform-drift-discussion-number.txt)"
          echo "title=$title" >>"$GITHUB_OUTPUT"
          echo "discussion_url=$url" >>"$GITHUB_OUTPUT"

      - name: Write alerting stub
        shell: bash
        run: |
          set -euo pipefail
          scripts/report_alert_stub.sh \
            --kind platform-drift \
            --title "${{ steps.publish.outputs.title }}" \
            --discussion-url "${{ steps.publish.outputs.discussion_url }}" \
            --output-file out/platform-drift-alerting-stub.md

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platform-drift-report
          retention-days: ${{ steps.config.outputs.artifact_retention }}
          path: out/

      - name: Write job summary
        shell: bash
        run: |
          {
            echo "## Platform Drift Report Published"
            echo
            echo "- Discussion: ${{ steps.publish.outputs.discussion_url }}"
            echo "- Team map: \`${{ steps.config.outputs.team_map }}\`"
            echo
            echo "Alerting is intentionally stubbed. See \`out/platform-drift-alerting-stub.md\` in the workflow artifact."
          } >>"$GITHUB_STEP_SUMMARY"
